name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: b2p-linux-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset: b2p-macos-arm64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: b2p-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging=staging
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/b2p" "$staging/"
          cp README.md "$staging/"
          [ -f LICENSE ] && cp LICENSE "$staging/" || true
          tar czf "${{ matrix.asset }}" -C "$staging" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/b2p.exe" $staging
          Copy-Item "README.md" $staging
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" $staging }
          Compress-Archive -Path "$staging/*" -DestinationPath "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  docker:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: b2p-linux-x86_64.tar.gz

      - name: Extract binary
        run: tar xzf b2p-linux-x86_64.tar.gz ./b2p && chmod +x b2p

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t "$IMAGE:${GITHUB_REF_NAME}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${GITHUB_REF_NAME}"
          docker push "$IMAGE:latest"
